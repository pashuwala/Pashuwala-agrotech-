<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Fixed</title><style>
body{font-family:Arial;background:#111;color:#fff;margin:0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;padding:20px}
.gi{position:relative;cursor:pointer}
.gi img,.gi video{width:100%;height:200px;object-fit:cover;border-radius:10px}
.play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30px;background:rgba(0,0,0,0.6);padding:10px;border-radius:50%}

.lb{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;justify-content:center;align-items:center;flex-direction:column}
.lb.on{display:flex}
.lb video,.lb img{max-width:90%;max-height:80%;border-radius:10px}
.lb-close{position:absolute;top:20px;right:20px;font-size:25px;background:red;color:#fff;border:none;padding:10px;cursor:pointer}
</style></head><body><h2 style="text-align:center">Gallery</h2><div class="grid"><!-- Image --><div class="gi" onclick="openImg('https://picsum.photos/800/500')">
  <img src="https://picsum.photos/400/300">
</div><!-- Video --><div class="gi" onclick="openVideo('sample.mp4')">
  <video muted>
    <source src="sample.mp4" type="video/mp4">
  </video>
  <div class="play-btn">▶</div>
</div></div><!-- Lightbox --><div class="lb" id="lightbox">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <video id="lbVideo" controls autoplay></video>
  <img id="lbImg" style="display:none;">
</div><script>
function openVideo(src){
  const lb = document.getElementById("lightbox");
  const video = document.getElementById("lbVideo");
  const img = document.getElementById("lbImg");

  img.style.display = "none";
  video.style.display = "block";

  video.src = src;
  video.load();
  video.play();

  lb.classList.add("on");
}

function openImg(src){
  const lb = document.getElementById("lightbox");
  const video = document.getElementById("lbVideo");
  const img = document.getElementById("lbImg");

  video.pause();
  video.style.display = "none";

  img.style.display = "block";
  img.src = src;

  lb.classList.add("on");
}

function closeLB(){
  const lb = document.getElementById("lightbox");
  const video = document.getElementById("lbVideo");

  video.pause();
  video.src = "";

  lb.classList.remove("on");
}
</script></body>
</html>
