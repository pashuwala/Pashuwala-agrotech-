<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Pashuwala Agrotech</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gd:#1a3c2e;--gm:#2d6a4f;--gb:#40916c;--gl:#74c69d;--gp:#b7e4c7;--cr:#f8f5ee;--go:#c9a84c}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--gd);color:var(--cr);font-family:'DM Sans',sans-serif;overflow-x:hidden}
.dot-grid{position:fixed;inset:0;z-index:1;background-image:radial-gradient(circle,rgba(116,198,157,.06) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}
.orb{position:fixed;z-index:1;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb1{width:500px;height:500px;top:-100px;right:-100px;background:rgba(64,145,108,.12)}
.orb2{width:400px;height:400px;bottom:100px;left:-80px;background:rgba(45,106,79,.1)}
header{position:relative;z-index:10;padding:0 5vw;background:linear-gradient(180deg,rgba(10,25,18,.98),rgba(26,60,46,.85));border-bottom:1px solid rgba(116,198,157,.18);display:flex;align-items:center;justify-content:space-between;height:76px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--gb),var(--go));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(64,145,108,.5)}
.logo-text strong{display:block;font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--cr)}
.logo-text span{font-size:.68rem;color:var(--gl);letter-spacing:.18em;text-transform:uppercase}
nav{display:flex;gap:28px}
nav a{color:rgba(248,245,238,.6);text-decoration:none;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;transition:color .25s}
nav a:hover,nav a.active{color:var(--gl)}

.hero{position:relative;z-index:2;height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 110%,rgba(64,145,108,.35),transparent 70%),linear-gradient(180deg,rgba(10,25,18,1),var(--gd))}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(116,198,157,.12);border:1px solid rgba(116,198,157,.3);border-radius:50px;padding:5px 16px;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gl);margin-bottom:14px}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,5vw,4.2rem);font-weight:900;color:var(--cr)}
h1 em{font-style:italic;background:linear-gradient(90deg,var(--gl),var(--go));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.filters{position:relative;z-index:5;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:24px 5vw}
.fb{background:rgba(45,106,79,.18);border:1px solid rgba(116,198,157,.22);color:rgba(248,245,238,.7);padding:8px 20px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:all .25s}
.fb:hover,.fb.on{background:var(--gb);border-color:var(--gb);color:#fff;box-shadow:0 4px 20px rgba(64,145,108,.4)}

.gsec{position:relative;z-index:2;padding:0 4vw 70px;max-width:1300px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:270px;gap:12px}
.gi{position:relative;overflow:hidden;border-radius:13px;background:rgba(45,106,79,.15);border:1px solid rgba(116,198,157,.1);cursor:pointer;transition:transform .4s cubic-bezier(.22,.9,.36,1)}
.gi:hover{transform:scale(1.02);z-index:3;box-shadow:0 20px 40px rgba(0,0,0,0.4)}
.tall{grid-row:span 2}
.s2{grid-column:span 2}
.gi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s}
.gi:hover img{transform:scale(1.08)}
.ov{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(10,25,18,.88));opacity:0;transition:opacity .35s;display:flex;align-items:flex-end;padding:16px}
.gi:hover .ov{opacity:1}
.ot{font-family:'Playfair Display',serif;font-size:.95rem;color:#fff}
.om{font-size:.68rem;color:var(--gp);text-transform:uppercase;margin-top:3px}

/* Video specific styles */
.vid-card .play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:54px;height:54px;background:var(--gb);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;z-index:2;box-shadow:0 0 20px rgba(0,0,0,0.3)}
.vid-card .vbadge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.6);padding:4px 10px;border-radius:4px;font-size:0.6rem;color:#fff;z-index:2}

/* Lightbox */
.lb{display:none;position:fixed;inset:0;z-index:1000;background:rgba(5,14,10,.98);align-items:center;justify-content:center;flex-direction:column;padding:20px}
.lb.on{display:flex}
.lb-content{max-width:90vw;max-height:80vh;border-radius:12px;overflow:hidden;box-shadow:0 0 50px rgba(0,0,0,0.5)}
.lb-content img, .lb-content video{width:100%;height:100%;display:block;object-fit:contain}
.lb-cap{margin-top:15px;color:var(--cr);font-family:'Playfair Display',serif;font-size:1.1rem}
.lb-close{position:fixed;top:30px;right:30px;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;z-index:1010}

@media(max-width:768px){ .grid{grid-template-columns:1fr 1fr} .s2{grid-column:span 1} }
</style>
</head>
<body>

<div class="dot-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<header>
  <div class="logo">
    <div class="logo-icon">🌾</div>
    <div class="logo-text"><strong>Pashuwala Agrotech</strong><span>Green Fodder Solutions</span></div>
  </div>
  <nav>
    <a href="#">Home</a><a href="#" class="active">Gallery</a>
    <a href="#">Products</a><a href="#">About</a>
  </nav>
</header>

<div class="hero">
  <div class="hero-bg"></div>
  <div class="badge">🌿 Field Operations</div>
  <h1>Live <em>Insights</em></h1>
</div>

<div class="filters">
  <button class="fb on" onclick="doFilter('all',this)">All</button>
  <button class="fb" onclick="doFilter('silage',this)">Silage</button>
  <button class="fb" onclick="doFilter('bale',this)">Bale Store</button>
  <button class="fb" onclick="doFilter('video',this)">Videos</button>
</div>

<section class="gsec">
  <div class="grid" id="grid">
    
    <div class="gi tall" data-cat="silage" onclick="openImg('16507.jpg', 'High Quality Corn Silage')">
      <img src="16507.jpg" alt="Silage">
      <div class="ov"><div><div class="ot">Corn Silage</div><div class="om">Field Fresh</div></div></div>
    </div>

    <div class="gi vid-card" data-cat="video" onclick="openVideo('21224.mp4', 'Precision Chopping in Action')">
      <div class="vbadge">VIDEO</div>
      <div class="play-btn">▶</div>
      <img src="16509.jpg" alt="Video Thumb"> <div class="ov"><div><div class="ot">Harvester Action</div><div class="om">Live Field Video</div></div></div>
    </div>

    <div class="gi" data-cat="silage" onclick="openImg('16509.jpg', 'Automated Harvesting')">
      <img src="16509.jpg" alt="Harvesting">
      <div class="ov"><div><div class="ot">Machinery</div><div class="om">Efficiency Redefined</div></div></div>
    </div>

    <div class="gi" data-cat="bale" onclick="openImg('16510.jpg', 'Premium Bale Storage')">
      <img src="16510.jpg" alt="Bale">
      <div class="ov"><div><div class="ot">Storage</div><div class="om">Bale Management</div></div></div>
    </div>

    <div class="gi s2 vid-card" data-cat="video" onclick="openVideo('21225.mp4', 'Fodder Processing Flow')">
      <div class="vbadge">VIDEO</div>
      <div class="play-btn">▶</div>
      <img src="16511.jpg" alt="Video Thumb"> <div class="ov"><div><div class="ot">Processing Line</div><div class="om">Quality Control</div></div></div>
    </div>

    <div class="gi" data-cat="bale" onclick="openImg('16511.jpg', 'Final Product Ready')">
      <img src="16511.jpg" alt="Final Product">
      <div class="ov"><div><div class="ot">Distribution</div><div class="om">Ready for Delivery</div></div></div>
    </div>

  </div>
</section>

<div class="lb" id="lb" onclick="if(event.target===this)closeLB()">
  <button class="lb-close" onclick="closeLB()">×</button>
  <div class="lb-content" id="lbm"></div>
  <div class="lb-cap" id="lbc"></div>
</div>

<script>
function doFilter(cat,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.gi').forEach(i=>{
    i.style.display=(cat==='all'||i.dataset.cat===cat)?'':'none';
  });
}

function openImg(src,cap){
  document.getElementById('lbm').innerHTML=`<img src="${src}" alt="${cap}">`;
  document.getElementById('lbc').textContent=cap;
  document.getElementById('lb').classList.add('on');
  document.body.style.overflow='hidden';
}

function openVideo(src,cap){
  document.getElementById('lbm').innerHTML=`
    <video controls autoplay playsinline>
      <source src="${src}" type="video/mp4">
      Your browser does not support the video tag.
    </video>`;
  document.getElementById('lbc').textContent=cap;
  document.getElementById('lb').classList.add('on');
  document.body.style.overflow='hidden';
}

function closeLB(){
  const lb = document.getElementById('lb');
  const lbm = document.getElementById('lbm');
  lb.classList.remove('on');
  lbm.innerHTML = ""; // This stops the video and audio immediately
  document.body.style.overflow='';
}
</script>

</body>
</html>
